sources:
  nipa: true # 정보통신산업진흥원 https://www.nipa.kr
  mss: true # 중소벤처기업부     https://www.mss.go.kr
  g2b: true # 나라장터           https://www.g2b.go.kr
  nia: true # 한국지능정보사회진흥원 https://www.nia.or.kr
  etri: true # 한국전자통신연구원  https://ebid.etri.re.kr

filters:
  keywords:
    - "AI"
    - "인공지능"
    - "데이터"
    - "소프트웨어"
    - "개발"
    - "정보화"
    - "디지털"
    - "용역"
    - "IT"
  exclude_keywords: [] # 이 키워드가 공고명/내용에 있으면 제외 (포함 키워드보다 우선)
  categories: [] # 나라장터 업종코드. 비워두면 전체 수집
  match_logic: "OR" # OR | AND

attachments:
  enabled: true
  download_dir: "./output"
  allowed_extensions:
    - ".pdf"
    - ".hwp"
    - ".hwpx"
    - ".docx"
    - ".xlsx"
    - ".zip"
    - ".pptx"
  max_file_size_mb: 50

output:
  directory: "./output"
  rolling_file: true
  filename: "announcements.xlsx"

schedule:
  enabled: true
  time: "08:00" # 매일 실행 시각 (24시간 형식)

api_keys:
  g2b_api_key: "" # .env 파일의 G2B_API_KEY 환경변수로 설정 권장

# 사이트별 URL 설정 — 사이트 리뉴얼로 URL/ID가 바뀌면 여기만 수정
sites:
  nipa:
    list_url: "https://www.nipa.kr/home/bsnsAll/0/nttList?bbsNo=4&bsnsDtlsIemNo=&tab=2"
    page_param: "curPage"
    max_pages: 5
  mss:
    list_url: "https://www.mss.go.kr/site/smba/ex/bbs/List.do?cbIdx=310"
    page_param: "currentPage"
    max_pages: 5
  g2b:
    api_base: "https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoServc"
    max_pages: 10
    date_range_days: 7 # 스크랩 실행일 기준 며칠 전 공고부터 수집할지
    filters: # 나라장터 전용 제외 키워드 (전역 설정에 병합됨)
      exclude_keywords:
        - "물품구매"
        - "시설공사"
        - "청소"
        - "경비"
        - "수리"
        - "인쇄"
  nia:
    list_url: "https://www.nia.or.kr/site/nia_kor/ex/bbs/List.do?cbIdx=78336"
    page_param: "currentPage"
    max_pages: 5
  etri:
    list_url: "https://ebid.etri.re.kr/ebid/ebid/nSsEbidbulletinListPopup.do"
    page_param: "pageNo"
    max_pages: 5

request:
  timeout: 30 # 초
  delay_min: 1.0 # 요청 간 최소 딜레이 (초)
  delay_max: 3.0 # 요청 간 최대 딜레이 (초)
  max_retries: 3
